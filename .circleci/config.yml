version: 2.1

parameters:
  elixir_version:
    type: string
    default: "1.18.4"
  erlang_version:
    type: string
    default: "27.3.4"
  ubuntu_base:
    type: string
    default: "jammy-20260109"

commands:
  setup_user:
    description: "Setup nerves user (crosstool-NG refuses to run as root)"
    steps:
      - run:
          name: Setup nerves user
          command: |
            # Create nerves user if it doesn't exist
            if ! id -u nerves > /dev/null 2>&1; then
              useradd -ms /bin/bash nerves
            fi
            # Ensure /home/nerves exists and has correct ownership
            mkdir -p /home/nerves/build
            chown -R nerves:nerves /home/nerves

  install_build_deps:
    description: "Install toolchain build dependencies"
    steps:
      - run:
          name: Install build dependencies
          command: |
            apt-get update
            apt-get install -y --no-install-recommends \
              git curl build-essential libtool gperf bison flex \
              texinfo wget gawk libtool-bin libncurses5-dev \
              help2man ca-certificates unzip lzip python3 rsync \
              autoconf automake xz-utils sudo
            rm -rf /var/lib/apt/lists/*

  install_hex_rebar:
    description: "Install hex and rebar"
    steps:
      - run:
          name: Install hex and rebar
          command: sudo -u nerves -E HOME=/home/nerves mix local.hex --force && sudo -u nerves -E HOME=/home/nerves mix local.rebar --force

  install_nerves_bootstrap:
    description: "Install nerves_bootstrap"
    steps:
      - run:
          name: Install nerves_bootstrap
          command: sudo -u nerves -E HOME=/home/nerves mix archive.install hex nerves_bootstrap --force

executors:
  elixir_builder:
    working_directory: /home/nerves/build
    docker:
      - image: hexpm/elixir:<< pipeline.parameters.elixir_version >>-erlang-<< pipeline.parameters.erlang_version >>-ubuntu-<< pipeline.parameters.ubuntu_base >>
    resource_class: large
    environment:
      ENV: CI
      BUILD_OS: linux

jobs:
  build_toolchain:
    parameters:
      toolchain:
        type: string
    executor: elixir_builder
    environment:
      TOOLCHAIN: << parameters.toolchain >>
    steps:
      - checkout
      - install_build_deps
      - setup_user
      - run:
          name: Fix checkout ownership
          command: chown -R nerves:nerves /home/nerves/build
      - install_hex_rebar
      - install_nerves_bootstrap
      - run:
          name: Setup cache keys
          command: |
            echo "<< parameters.toolchain >>" > .toolchain
            echo "linux" > .build_os
      - restore_cache:
          key: nerves/dl/{{ checksum ".toolchain" }}/{{ checksum ".build_os" }}-{{ .Branch }}
      - run:
          name: Fix cache ownership
          command: |
            mkdir -p /home/nerves/.nerves/dl
            if [ -d /root/.nerves/dl ]; then
              cp -r /root/.nerves/dl/* /home/nerves/.nerves/dl/ || true
            fi
            chown -R nerves:nerves /home/nerves/.nerves
      - run:
          name: Fetch dependencies
          command: |
            cd << parameters.toolchain >>
            sudo -u nerves -E HOME=/home/nerves mix deps.get || (sleep 5; sudo -u nerves -E HOME=/home/nerves mix deps.get)
      - run:
          name: Build toolchain
          command: |
            cd << parameters.toolchain >>
            sudo -u nerves -E HOME=/home/nerves mix compile
      - run:
          name: Create artifact directory
          command: |
            mkdir -p /home/nerves/deploy/toolchain
            chown -R nerves:nerves /home/nerves/deploy
      - run:
          name: Create artifact
          command: |
            cd << parameters.toolchain >>
            sudo -u nerves -E HOME=/home/nerves mix nerves.artifact << parameters.toolchain >> --path /home/nerves/deploy/toolchain
      - run:
          name: Prepare cache for saving
          command: |
            mkdir -p /root/.nerves/dl
            if [ -d /home/nerves/.nerves/dl ]; then
              cp -r /home/nerves/.nerves/dl/* /root/.nerves/dl/ || true
            fi
      - save_cache:
          key: nerves/dl/{{ checksum ".toolchain" }}/{{ checksum ".build_os" }}-{{ .Branch }}
          paths:
            - /root/.nerves/dl
      - store_artifacts:
          path: /home/nerves/deploy/toolchain
          destination: toolchain
      - save_cache:
          key: nerves/deploy/{{ checksum ".toolchain" }}/{{ checksum ".build_os" }}-{{ .Revision }}-{{ .Environment.CIRCLE_TAG }}
          paths:
            - /home/nerves/deploy/toolchain

  test_toolchain:
    parameters:
      toolchain:
        type: string
      ubuntu_version:
        type: string
    working_directory: /home/nerves/build
    docker:
      - image: ubuntu:<< parameters.ubuntu_version >>
    environment:
      TOOLCHAIN: << parameters.toolchain >>
      BUILD_OS: linux
    steps:
      - checkout
      - run:
          name: Setup cache keys
          command: |
            echo "<< parameters.toolchain >>" > .toolchain
            echo "linux" > .build_os
      - restore_cache:
          key: nerves/deploy/{{ checksum ".toolchain" }}/{{ checksum ".build_os" }}-{{ .Revision }}-{{ .Environment.CIRCLE_TAG }}
      - run:
          name: Install xz-utils
          command: |
            apt-get update
            apt-get -y install xz-utils
      - run:
          name: Decompress toolchain archive
          command: |
            mkdir -p /root/toolchain
            tar xvf /home/nerves/deploy/toolchain/*.tar.xz --strip-components=1 -C /root/toolchain
      - run:
          name: Compile hello world app
          command: /root/toolchain/bin/*-g++ /home/nerves/build/support/smoketest/main.cpp

  deploy:
    executor: elixir_builder
    steps:
      - checkout
      - install_build_deps
      - run:
          name: Create artifacts directory
          command: mkdir -p /home/nerves/deploy/artifacts
      - run:
          name: Restore all toolchain artifacts
          command: |
            for toolchain in aarch64_nerves_linux_gnu aarch64_nerves_linux_musl \
                             armv7_nerves_linux_gnueabihf armv7_nerves_linux_musleabihf \
                             armv5_nerves_linux_musleabi armv6_nerves_linux_gnueabihf \
                             i586_nerves_linux_gnu mipsel_nerves_linux_musl \
                             x86_64_nerves_linux_gnu x86_64_nerves_linux_musl \
                             riscv64_nerves_linux_musl riscv64_nerves_linux_gnu; do
              echo "nerves_toolchain_${toolchain}" > .toolchain
              echo "linux" > .build_os
            done
      - restore_cache:
          key: nerves/deploy/nerves_toolchain_aarch64_nerves_linux_gnu/linux-{{ .Revision }}-{{ .Environment.CIRCLE_TAG }}
      - restore_cache:
          key: nerves/deploy/nerves_toolchain_aarch64_nerves_linux_musl/linux-{{ .Revision }}-{{ .Environment.CIRCLE_TAG }}
      - restore_cache:
          key: nerves/deploy/nerves_toolchain_armv7_nerves_linux_gnueabihf/linux-{{ .Revision }}-{{ .Environment.CIRCLE_TAG }}
      - restore_cache:
          key: nerves/deploy/nerves_toolchain_armv7_nerves_linux_musleabihf/linux-{{ .Revision }}-{{ .Environment.CIRCLE_TAG }}
      - restore_cache:
          key: nerves/deploy/nerves_toolchain_armv5_nerves_linux_musleabi/linux-{{ .Revision }}-{{ .Environment.CIRCLE_TAG }}
      - restore_cache:
          key: nerves/deploy/nerves_toolchain_armv6_nerves_linux_gnueabihf/linux-{{ .Revision }}-{{ .Environment.CIRCLE_TAG }}
      - restore_cache:
          key: nerves/deploy/nerves_toolchain_i586_nerves_linux_gnu/linux-{{ .Revision }}-{{ .Environment.CIRCLE_TAG }}
      - restore_cache:
          key: nerves/deploy/nerves_toolchain_mipsel_nerves_linux_musl/linux-{{ .Revision }}-{{ .Environment.CIRCLE_TAG }}
      - restore_cache:
          key: nerves/deploy/nerves_toolchain_x86_64_nerves_linux_gnu/linux-{{ .Revision }}-{{ .Environment.CIRCLE_TAG }}
      - restore_cache:
          key: nerves/deploy/nerves_toolchain_x86_64_nerves_linux_musl/linux-{{ .Revision }}-{{ .Environment.CIRCLE_TAG }}
      - restore_cache:
          key: nerves/deploy/nerves_toolchain_riscv64_nerves_linux_musl/linux-{{ .Revision }}-{{ .Environment.CIRCLE_TAG }}
      - restore_cache:
          key: nerves/deploy/nerves_toolchain_riscv64_nerves_linux_gnu/linux-{{ .Revision }}-{{ .Environment.CIRCLE_TAG }}
      - run:
          name: Copy artifacts
          command: cp /home/nerves/deploy/toolchain/*.tar.xz /home/nerves/deploy/artifacts || true
      - run:
          name: Install ghr
          command: |
            wget https://github.com/tcnksm/ghr/releases/download/v0.5.4/ghr_v0.5.4_linux_amd64.zip
            unzip ghr_v0.5.4_linux_amd64.zip
      - run:
          name: Create release notes
          command: grep -Pazo "(?s)(?<=## ${CIRCLE_TAG})[^#]+" ./CHANGELOG.md > /home/nerves/deploy/RELEASE_NOTES
      - run:
          name: Deploy artifacts to GitHub
          command: ./ghr -draft -t $GITHUB_TOKEN -u $CIRCLE_PROJECT_USERNAME -r $CIRCLE_PROJECT_REPONAME -b "$(cat /home/nerves/deploy/RELEASE_NOTES)" $CIRCLE_TAG /home/nerves/deploy/artifacts

workflows:
  build_test_deploy:
    jobs:
      # Build all toolchains
      - build_toolchain:
          name: build_nerves_toolchain_aarch64_nerves_linux_gnu
          toolchain: nerves_toolchain_aarch64_nerves_linux_gnu
          context: org-global
          filters: &version_filters
            tags:
              only: /.*/

      - build_toolchain:
          name: build_nerves_toolchain_aarch64_nerves_linux_musl
          toolchain: nerves_toolchain_aarch64_nerves_linux_musl
          context: org-global
          filters: *version_filters

      - build_toolchain:
          name: build_nerves_toolchain_armv7_nerves_linux_gnueabihf
          toolchain: nerves_toolchain_armv7_nerves_linux_gnueabihf
          context: org-global
          filters: *version_filters

      - build_toolchain:
          name: build_nerves_toolchain_armv7_nerves_linux_musleabihf
          toolchain: nerves_toolchain_armv7_nerves_linux_musleabihf
          context: org-global
          filters: *version_filters

      - build_toolchain:
          name: build_nerves_toolchain_armv5_nerves_linux_musleabi
          toolchain: nerves_toolchain_armv5_nerves_linux_musleabi
          context: org-global
          filters: *version_filters

      - build_toolchain:
          name: build_nerves_toolchain_armv6_nerves_linux_gnueabihf
          toolchain: nerves_toolchain_armv6_nerves_linux_gnueabihf
          context: org-global
          filters: *version_filters

      - build_toolchain:
          name: build_nerves_toolchain_i586_nerves_linux_gnu
          toolchain: nerves_toolchain_i586_nerves_linux_gnu
          context: org-global
          filters: *version_filters

      - build_toolchain:
          name: build_nerves_toolchain_mipsel_nerves_linux_musl
          toolchain: nerves_toolchain_mipsel_nerves_linux_musl
          context: org-global
          filters: *version_filters

      - build_toolchain:
          name: build_nerves_toolchain_x86_64_nerves_linux_gnu
          toolchain: nerves_toolchain_x86_64_nerves_linux_gnu
          context: org-global
          filters: *version_filters

      - build_toolchain:
          name: build_nerves_toolchain_x86_64_nerves_linux_musl
          toolchain: nerves_toolchain_x86_64_nerves_linux_musl
          context: org-global
          filters: *version_filters

      - build_toolchain:
          name: build_nerves_toolchain_riscv64_nerves_linux_musl
          toolchain: nerves_toolchain_riscv64_nerves_linux_musl
          context: org-global
          filters: *version_filters

      - build_toolchain:
          name: build_nerves_toolchain_riscv64_nerves_linux_gnu
          toolchain: nerves_toolchain_riscv64_nerves_linux_gnu
          context: org-global
          filters: *version_filters

      # Test all toolchains on Focal (20.04), Jammy (22.04), and Noble (24.04)
      # Spot check all toolchains on Focal and Jammy
      - test_toolchain:
          name: test_aarch64_gnu_focal
          toolchain: nerves_toolchain_aarch64_nerves_linux_gnu
          ubuntu_version: focal
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_aarch64_nerves_linux_gnu

      - test_toolchain:
          name: test_aarch64_gnu_jammy
          toolchain: nerves_toolchain_aarch64_nerves_linux_gnu
          ubuntu_version: jammy
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_aarch64_nerves_linux_gnu

      - test_toolchain:
          name: test_aarch64_gnu_noble
          toolchain: nerves_toolchain_aarch64_nerves_linux_gnu
          ubuntu_version: noble
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_aarch64_nerves_linux_gnu

      - test_toolchain:
          name: test_aarch64_musl_focal
          toolchain: nerves_toolchain_aarch64_nerves_linux_musl
          ubuntu_version: focal
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_aarch64_nerves_linux_musl

      - test_toolchain:
          name: test_aarch64_musl_jammy
          toolchain: nerves_toolchain_aarch64_nerves_linux_musl
          ubuntu_version: jammy
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_aarch64_nerves_linux_musl

      - test_toolchain:
          name: test_armv7_hf_focal
          toolchain: nerves_toolchain_armv7_nerves_linux_gnueabihf
          ubuntu_version: focal
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_armv7_nerves_linux_gnueabihf

      - test_toolchain:
          name: test_armv7_hf_jammy
          toolchain: nerves_toolchain_armv7_nerves_linux_gnueabihf
          ubuntu_version: jammy
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_armv7_nerves_linux_gnueabihf

      - test_toolchain:
          name: test_armv7_musl_focal
          toolchain: nerves_toolchain_armv7_nerves_linux_musleabihf
          ubuntu_version: focal
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_armv7_nerves_linux_musleabihf

      - test_toolchain:
          name: test_armv7_musl_jammy
          toolchain: nerves_toolchain_armv7_nerves_linux_musleabihf
          ubuntu_version: jammy
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_armv7_nerves_linux_musleabihf

      - test_toolchain:
          name: test_armv5_focal
          toolchain: nerves_toolchain_armv5_nerves_linux_musleabi
          ubuntu_version: focal
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_armv5_nerves_linux_musleabi

      - test_toolchain:
          name: test_armv5_jammy
          toolchain: nerves_toolchain_armv5_nerves_linux_musleabi
          ubuntu_version: jammy
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_armv5_nerves_linux_musleabi

      - test_toolchain:
          name: test_armv6_focal
          toolchain: nerves_toolchain_armv6_nerves_linux_gnueabihf
          ubuntu_version: focal
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_armv6_nerves_linux_gnueabihf

      - test_toolchain:
          name: test_armv6_jammy
          toolchain: nerves_toolchain_armv6_nerves_linux_gnueabihf
          ubuntu_version: jammy
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_armv6_nerves_linux_gnueabihf

      - test_toolchain:
          name: test_i586_focal
          toolchain: nerves_toolchain_i586_nerves_linux_gnu
          ubuntu_version: focal
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_i586_nerves_linux_gnu

      - test_toolchain:
          name: test_i586_jammy
          toolchain: nerves_toolchain_i586_nerves_linux_gnu
          ubuntu_version: jammy
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_i586_nerves_linux_gnu

      - test_toolchain:
          name: test_mipsel_focal
          toolchain: nerves_toolchain_mipsel_nerves_linux_musl
          ubuntu_version: focal
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_mipsel_nerves_linux_musl

      - test_toolchain:
          name: test_mipsel_jammy
          toolchain: nerves_toolchain_mipsel_nerves_linux_musl
          ubuntu_version: jammy
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_mipsel_nerves_linux_musl

      - test_toolchain:
          name: test_x86_64_gnu_focal
          toolchain: nerves_toolchain_x86_64_nerves_linux_gnu
          ubuntu_version: focal
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_x86_64_nerves_linux_gnu

      - test_toolchain:
          name: test_x86_64_gnu_jammy
          toolchain: nerves_toolchain_x86_64_nerves_linux_gnu
          ubuntu_version: jammy
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_x86_64_nerves_linux_gnu

      - test_toolchain:
          name: test_x86_64_musl_focal
          toolchain: nerves_toolchain_x86_64_nerves_linux_musl
          ubuntu_version: focal
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_x86_64_nerves_linux_musl

      - test_toolchain:
          name: test_x86_64_musl_jammy
          toolchain: nerves_toolchain_x86_64_nerves_linux_musl
          ubuntu_version: jammy
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_x86_64_nerves_linux_musl

      - test_toolchain:
          name: test_riscv64_musl_focal
          toolchain: nerves_toolchain_riscv64_nerves_linux_musl
          ubuntu_version: focal
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_riscv64_nerves_linux_musl

      - test_toolchain:
          name: test_riscv64_musl_jammy
          toolchain: nerves_toolchain_riscv64_nerves_linux_musl
          ubuntu_version: jammy
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_riscv64_nerves_linux_musl

      - test_toolchain:
          name: test_riscv64_gnu_focal
          toolchain: nerves_toolchain_riscv64_nerves_linux_gnu
          ubuntu_version: focal
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_riscv64_nerves_linux_gnu

      - test_toolchain:
          name: test_riscv64_gnu_jammy
          toolchain: nerves_toolchain_riscv64_nerves_linux_gnu
          ubuntu_version: jammy
          context: org-global
          filters: *version_filters
          requires:
            - build_nerves_toolchain_riscv64_nerves_linux_gnu

      # Deploy all toolchains
      - deploy:
          context: org-global
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /v.*/
          requires:
            - test_aarch64_gnu_focal
            - test_aarch64_gnu_jammy
            - test_aarch64_gnu_noble
            - test_aarch64_musl_focal
            - test_aarch64_musl_jammy
            - test_armv7_hf_focal
            - test_armv7_hf_jammy
            - test_armv7_musl_focal
            - test_armv7_musl_jammy
            - test_armv5_focal
            - test_armv5_jammy
            - test_armv6_focal
            - test_armv6_jammy
            - test_i586_focal
            - test_i586_jammy
            - test_mipsel_focal
            - test_mipsel_jammy
            - test_x86_64_gnu_focal
            - test_x86_64_gnu_jammy
            - test_x86_64_musl_focal
            - test_x86_64_musl_jammy
            - test_riscv64_musl_focal
            - test_riscv64_musl_jammy
            - test_riscv64_gnu_focal
            - test_riscv64_gnu_jammy
