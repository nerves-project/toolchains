name: Build and Test Toolchains

# ============================================================================
# BUILD CONFIGURATION - Toggle this value to control which toolchains to build
# ============================================================================
# false = build only armv7_gnueabihf (fast, for development)
# true  = build all 12 toolchains (slow, for releases - CURRENTLY ACTIVE)
#
# Search for "BUILD_ALL_TOOLCHAINS" below and change true to false
# ============================================================================

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    name: Check generated toolchains
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19'
          otp-version: '28'

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl build-essential libtool gperf bison flex \
            texinfo wget gawk libtool-bin libncurses5-dev \
            help2man ca-certificates unzip lzip python3 rsync \
            autoconf automake xz-utils

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Check generated toolchains
        run: |
          make
          make check

  build_and_test:
    name: Build and test ${{ matrix.toolchain }}
    strategy:
      fail-fast: false
      matrix:
        # BUILD_ALL_TOOLCHAINS: Change 'true' to 'false' to build only armv7
        toolchain: ${{ true && fromJSON('["nerves_toolchain_aarch64_nerves_linux_gnu", "nerves_toolchain_aarch64_nerves_linux_musl", "nerves_toolchain_armv7_nerves_linux_gnueabihf", "nerves_toolchain_armv7_nerves_linux_musleabihf", "nerves_toolchain_armv5_nerves_linux_musleabi", "nerves_toolchain_armv6_nerves_linux_gnueabihf", "nerves_toolchain_i586_nerves_linux_gnu", "nerves_toolchain_mipsel_nerves_linux_musl", "nerves_toolchain_x86_64_nerves_linux_gnu", "nerves_toolchain_x86_64_nerves_linux_musl", "nerves_toolchain_riscv64_nerves_linux_musl", "nerves_toolchain_riscv64_nerves_linux_gnu"]') || fromJSON('["nerves_toolchain_armv7_nerves_linux_gnueabihf"]') }}
    uses: ./.github/workflows/build-test-toolchain.yml
    with:
      toolchain: ${{ matrix.toolchain }}

  deploy:
    name: Deploy to GitHub Release
    needs: build_and_test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare artifacts for upload
        run: |
          mkdir -p release-artifacts

          mapfile -t archives < <(find artifacts -type f -name "*.tar.xz" | sort)

          if [ "${#archives[@]}" -eq 0 ]; then
            echo "No .tar.xz artifacts found"
            exit 1
          fi

          duplicate_filenames="$(
            printf '%s\n' "${archives[@]}" \
              | xargs -n1 basename \
              | sort \
              | uniq -d
          )"

          if [ -n "${duplicate_filenames}" ]; then
            echo "Duplicate release artifact filenames detected:"
            printf '%s\n' "${duplicate_filenames}"
            exit 1
          fi

          cp "${archives[@]}" release-artifacts/
          ls -lh release-artifacts/

      - name: Extract release notes
        run: |
          awk -v version="${GITHUB_REF_NAME}" '
            $0 == "## " version {
              found = 1
              next
            }
            found && /^## / {
              exit
            }
            found {
              print
            }
          ' ./CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No release notes found for ${GITHUB_REF_NAME}" > RELEASE_NOTES.md
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_args=(
            "${GITHUB_REF_NAME}"
            --title "${GITHUB_REF_NAME}"
            --notes-file RELEASE_NOTES.md
          )

          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            release_args+=(--prerelease)
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file RELEASE_NOTES.md
          else
            gh release create "${release_args[@]}"
          fi

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" release-artifacts/*.tar.xz --clobber
