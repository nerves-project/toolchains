name: Build and Test Toolchains

# ============================================================================
# BUILD CONFIGURATION - Toggle this value to control which toolchains to build
# ============================================================================
# false = build only armv7_gnueabihf (fast, for development - CURRENTLY ACTIVE)
# true  = build all 12 toolchains (slow, for releases)
#
# Search for "BUILD_ALL_TOOLCHAINS" below and change false to true (3 places)
# ============================================================================

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.toolchain }} on ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # BUILD_ALL_TOOLCHAINS: Change 'false' to 'true' to build all toolchains
        toolchain: ${{ false && fromJSON('["nerves_toolchain_aarch64_nerves_linux_gnu", "nerves_toolchain_aarch64_nerves_linux_musl", "nerves_toolchain_armv7_nerves_linux_gnueabihf", "nerves_toolchain_armv7_nerves_linux_musleabihf", "nerves_toolchain_armv5_nerves_linux_musleabi", "nerves_toolchain_armv6_nerves_linux_gnueabihf", "nerves_toolchain_i586_nerves_linux_gnu", "nerves_toolchain_mipsel_nerves_linux_musl", "nerves_toolchain_x86_64_nerves_linux_gnu", "nerves_toolchain_x86_64_nerves_linux_musl", "nerves_toolchain_riscv64_nerves_linux_musl", "nerves_toolchain_riscv64_nerves_linux_gnu"]') || fromJSON('["nerves_toolchain_armv7_nerves_linux_gnueabihf"]') }}
        os: [linux, darwin]
        arch: [x86_64, aarch64]
        include:
          # Build on the oldest runners for better compatibility
          - os: linux
            arch: x86_64
            runner: ubuntu-22.04
          - os: linux
            arch: aarch64
            runner: ubuntu-22.04-arm
          - os: darwin
            arch: x86_64
            runner: macos-14-large
          - os: darwin
            arch: aarch64
            runner: macos-14

    steps:
      - name: Free up disk space (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies (Linux)
        if: matrix.os == 'linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl build-essential libtool gperf bison flex \
            texinfo wget gawk libtool-bin libncurses5-dev \
            help2man ca-certificates unzip lzip python3 rsync \
            autoconf automake xz-utils

      - name: Install Erlang and Elixir (Linux)
        if: matrix.os == 'linux'
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17.3'
          otp-version: '26.2'

      - name: Install build dependencies (macOS)
        if: matrix.os == 'darwin'
        run: |
          # Full list of packages. Trim down to just what's needed to minimize CI warnings
          # brew install gawk binutils xz wget automake gnu-tar help2man bash make ncurses libtool autoconf gnu-sed mpfr gmp gcc bison lzip python3 grep coreutils texinfo erlang elixir
          brew install gawk binutils automake help2man bash make ncurses libtool autoconf gnu-sed bison lzip grep coreutils texinfo erlang elixir

      - name: Install hex and rebar (Linux)
        if: matrix.os == 'linux'
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install hex and rebar (macOS)
        if: matrix.os == 'darwin'
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install nerves_bootstrap (Linux)
        if: matrix.os == 'linux'
        run: mix archive.install hex nerves_bootstrap --force

      - name: Install nerves_bootstrap (macOS)
        if: matrix.os == 'darwin'
        run: mix archive.install hex nerves_bootstrap --force

      - name: Cache crosstool-NG downloads (Linux)
        if: matrix.os == 'linux'
        uses: actions/cache@v4
        with:
          path: ~/.nerves/dl
          key: nerves-dl-${{ matrix.toolchain }}-${{ matrix.os }}-${{ matrix.arch }}
          restore-keys: |
            nerves-dl-${{ matrix.toolchain }}-${{ matrix.os }}-
            nerves-dl-${{ matrix.toolchain }}-

      - name: Cache crosstool-NG downloads (macOS)
        if: matrix.os == 'darwin'
        uses: actions/cache@v4
        with:
          path: ~/.nerves/dl
          key: nerves-dl-${{ matrix.toolchain }}-${{ matrix.os }}-${{ matrix.arch }}
          restore-keys: |
            nerves-dl-${{ matrix.toolchain }}-${{ matrix.os }}-
            nerves-dl-${{ matrix.toolchain }}-

      - name: Fetch dependencies (Linux)
        if: matrix.os == 'linux'
        working-directory: ${{ matrix.toolchain }}
        run: mix deps.get

      - name: Fetch dependencies (macOS)
        if: matrix.os == 'darwin'
        working-directory: ${{ matrix.toolchain }}
        run: mix deps.get

      - name: Build toolchain (Linux)
        if: matrix.os == 'linux'
        working-directory: ${{ matrix.toolchain }}
        run: mix compile

      - name: Build toolchain (macOS)
        if: matrix.os == 'darwin'
        working-directory: ${{ matrix.toolchain }}
        run: mix compile

      - name: Create artifact directory (Linux)
        if: matrix.os == 'linux'
        run: mkdir -p $HOME/deploy/toolchain

      - name: Create artifact directory (macOS)
        if: matrix.os == 'darwin'
        run: mkdir -p $HOME/deploy/toolchain

      - name: Create artifact (Linux)
        if: matrix.os == 'linux'
        working-directory: ${{ matrix.toolchain }}
        run: mix nerves.artifact ${{ matrix.toolchain }} --path $HOME/deploy/toolchain

      - name: Create artifact (macOS)
        if: matrix.os == 'darwin'
        working-directory: ${{ matrix.toolchain }}
        run: mix nerves.artifact ${{ matrix.toolchain }} --path $HOME/deploy/toolchain

      - name: Upload artifact (Linux)
        if: matrix.os == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.toolchain }}-${{ matrix.os }}-${{ matrix.arch }}
          path: ~/deploy/toolchain/*.tar.xz
          retention-days: 7

      - name: Upload artifact (macOS)
        if: matrix.os == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.toolchain }}-${{ matrix.os }}-${{ matrix.arch }}
          path: ~/deploy/toolchain/*.tar.xz
          retention-days: 7

  test:
    name: Test ${{ matrix.toolchain }} (linux-${{ matrix.build_arch }}) on ubuntu-${{ matrix.ubuntu_version }}${{ matrix.build_arch == 'aarch64' && '-arm' || '' }}
    needs: build
    runs-on: ${{ matrix.build_arch == 'aarch64' && format('ubuntu-{0}-arm', matrix.ubuntu_version) || format('ubuntu-{0}', matrix.ubuntu_version) }}
    strategy:
      fail-fast: false
      matrix:
        # BUILD_ALL_TOOLCHAINS: Change 'false' to 'true' to build all toolchains
        toolchain: ${{ false && fromJSON('["nerves_toolchain_aarch64_nerves_linux_gnu", "nerves_toolchain_aarch64_nerves_linux_musl", "nerves_toolchain_armv7_nerves_linux_gnueabihf", "nerves_toolchain_armv7_nerves_linux_musleabihf", "nerves_toolchain_armv5_nerves_linux_musleabi", "nerves_toolchain_armv6_nerves_linux_gnueabihf", "nerves_toolchain_i586_nerves_linux_gnu", "nerves_toolchain_mipsel_nerves_linux_musl", "nerves_toolchain_x86_64_nerves_linux_gnu", "nerves_toolchain_x86_64_nerves_linux_musl", "nerves_toolchain_riscv64_nerves_linux_musl", "nerves_toolchain_riscv64_nerves_linux_gnu"]') || fromJSON('["nerves_toolchain_armv7_nerves_linux_gnueabihf"]') }}
        build_arch: [x86_64, aarch64]
        ubuntu_version: ['22.04', '24.04']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install xz-utils
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xz-utils

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.toolchain }}-linux-${{ matrix.build_arch }}
          path: /tmp/toolchain

      - name: Decompress toolchain archive
        run: |
          mkdir -p $HOME/toolchain
          tar xvf /tmp/toolchain/*.tar.xz --strip-components=1 -C $HOME/toolchain

      - name: Compile hello world app
        run: $HOME/toolchain/bin/*-g++ $GITHUB_WORKSPACE/support/smoketest/main.cpp

  test_macos:
    name: Test ${{ matrix.toolchain }} (darwin-${{ matrix.arch }}) on ${{ matrix.runner }}
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # BUILD_ALL_TOOLCHAINS: Change 'false' to 'true' to build all toolchains
        toolchain: ${{ false && fromJSON('["nerves_toolchain_aarch64_nerves_linux_gnu", "nerves_toolchain_aarch64_nerves_linux_musl", "nerves_toolchain_armv7_nerves_linux_gnueabihf", "nerves_toolchain_armv7_nerves_linux_musleabihf", "nerves_toolchain_armv5_nerves_linux_musleabi", "nerves_toolchain_armv6_nerves_linux_gnueabihf", "nerves_toolchain_i586_nerves_linux_gnu", "nerves_toolchain_mipsel_nerves_linux_musl", "nerves_toolchain_x86_64_nerves_linux_gnu", "nerves_toolchain_x86_64_nerves_linux_musl", "nerves_toolchain_riscv64_nerves_linux_musl", "nerves_toolchain_riscv64_nerves_linux_gnu"]') || fromJSON('["nerves_toolchain_armv7_nerves_linux_gnueabihf"]') }}
        include:
          # Apple Silicon runners
          - runner: macos-14
            arch: aarch64
          - runner: macos-15
            arch: aarch64
          - runner: macos-26
            arch: aarch64
          # Intel runners
          - runner: macos-14-large
            arch: x86_64
          - runner: macos-15-intel
            arch: x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.toolchain }}-darwin-${{ matrix.arch }}
          path: /tmp/toolchain

      - name: Decompress toolchain archive
        run: |
          mkdir -p $HOME/toolchain
          tar xvf /tmp/toolchain/*.tar.xz --strip-components=1 -C $HOME/toolchain

      - name: Compile hello world app
        run: $HOME/toolchain/bin/*-g++ $GITHUB_WORKSPACE/support/smoketest/main.cpp

  deploy:
    name: Deploy to GitHub Release
    needs: [test, test_macos]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare artifacts for upload
        run: |
          mkdir -p release-artifacts
          find artifacts -name "*.tar.xz" -exec cp {} release-artifacts/ \;
          ls -lh release-artifacts/

      - name: Extract release notes
        run: |
          grep -Pazo "(?s)(?<=## ${GITHUB_REF_NAME})[^#]+" ./CHANGELOG.md > RELEASE_NOTES.md || echo "No release notes found for ${GITHUB_REF_NAME}" > RELEASE_NOTES.md

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} release-artifacts/*.tar.xz
