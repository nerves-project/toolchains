name: Build and Test Toolchains

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    name: Build ${{ matrix.toolchain }} on ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.os == 'linux' && fromJSON('{"image":"hexpm/elixir:1.17.3-erlang-26.2-ubuntu-focal-20250404"}') || null }}
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - nerves_toolchain_aarch64_nerves_linux_gnu
          - nerves_toolchain_aarch64_nerves_linux_musl
          - nerves_toolchain_armv7_nerves_linux_gnueabihf
          - nerves_toolchain_armv7_nerves_linux_musleabihf
          - nerves_toolchain_armv5_nerves_linux_musleabi
          - nerves_toolchain_armv6_nerves_linux_gnueabihf
          - nerves_toolchain_i586_nerves_linux_gnu
          - nerves_toolchain_mipsel_nerves_linux_musl
          - nerves_toolchain_x86_64_nerves_linux_gnu
          - nerves_toolchain_x86_64_nerves_linux_musl
          - nerves_toolchain_riscv64_nerves_linux_musl
          - nerves_toolchain_riscv64_nerves_linux_gnu
        os: [linux, darwin]
        arch: [x86_64, aarch64]
        exclude:
          # Only build macOS on Apple Silicon
          - os: darwin
            arch: x86_64
        include:
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
          - os: linux
            arch: aarch64
            runner: ubuntu-24.04-arm64
          - os: darwin
            arch: aarch64
            runner: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies (Linux)
        if: matrix.os == 'linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git curl build-essential libtool gperf bison flex \
            texinfo wget gawk libtool-bin libncurses5-dev \
            help2man ca-certificates unzip lzip python3 rsync \
            autoconf automake xz-utils sudo
          rm -rf /var/lib/apt/lists/*

      - name: Install build dependencies (macOS)
        if: matrix.os == 'darwin'
        run: |
          brew install gawk binutils xz wget automake gnu-tar help2man bash make ncurses libtool autoconf gnu-sed mpfr gmp gcc bison lzip python3 grep coreutils texinfo erlang elixir

      - name: Setup nerves user (Linux)
        if: matrix.os == 'linux'
        run: |
          useradd -ms /bin/bash nerves
          mkdir -p /home/nerves/build
          chown -R nerves:nerves /home/nerves
          chown -R nerves:nerves $GITHUB_WORKSPACE

      - name: Install hex and rebar (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo -u nerves -E HOME=/home/nerves mix local.hex --force
          sudo -u nerves -E HOME=/home/nerves mix local.rebar --force

      - name: Install hex and rebar (macOS)
        if: matrix.os == 'darwin'
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install nerves_bootstrap (Linux)
        if: matrix.os == 'linux'
        run: sudo -u nerves -E HOME=/home/nerves mix archive.install hex nerves_bootstrap --force

      - name: Install nerves_bootstrap (macOS)
        if: matrix.os == 'darwin'
        run: mix archive.install hex nerves_bootstrap --force

      - name: Cache crosstool-NG downloads (Linux)
        if: matrix.os == 'linux'
        uses: actions/cache@v4
        with:
          path: /home/nerves/.nerves/dl
          key: nerves-dl-${{ matrix.toolchain }}-${{ matrix.os }}-${{ matrix.arch }}
          restore-keys: |
            nerves-dl-${{ matrix.toolchain }}-${{ matrix.os }}-
            nerves-dl-${{ matrix.toolchain }}-

      - name: Cache crosstool-NG downloads (macOS)
        if: matrix.os == 'darwin'
        uses: actions/cache@v4
        with:
          path: ~/.nerves/dl
          key: nerves-dl-${{ matrix.toolchain }}-${{ matrix.os }}-${{ matrix.arch }}
          restore-keys: |
            nerves-dl-${{ matrix.toolchain }}-${{ matrix.os }}-
            nerves-dl-${{ matrix.toolchain }}-

      - name: Fix cache ownership (Linux)
        if: matrix.os == 'linux'
        run: |
          mkdir -p /home/nerves/.nerves/dl
          chown -R nerves:nerves /home/nerves/.nerves

      - name: Fetch dependencies (Linux)
        if: matrix.os == 'linux'
        working-directory: ${{ matrix.toolchain }}
        run: sudo -u nerves -E HOME=/home/nerves mix deps.get

      - name: Fetch dependencies (macOS)
        if: matrix.os == 'darwin'
        working-directory: ${{ matrix.toolchain }}
        run: mix deps.get

      - name: Add swap space for RISC-V builds (Linux)
        if: matrix.os == 'linux' && contains(matrix.toolchain, 'riscv64')
        run: |
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show

      - name: Build toolchain (Linux)
        if: matrix.os == 'linux'
        working-directory: ${{ matrix.toolchain }}
        run: sudo -u nerves -E HOME=/home/nerves mix compile

      - name: Build toolchain (macOS)
        if: matrix.os == 'darwin'
        working-directory: ${{ matrix.toolchain }}
        run: mix compile

      - name: Create artifact directory (Linux)
        if: matrix.os == 'linux'
        run: |
          mkdir -p /home/nerves/deploy/toolchain
          chown -R nerves:nerves /home/nerves/deploy

      - name: Create artifact directory (macOS)
        if: matrix.os == 'darwin'
        run: mkdir -p $HOME/deploy/toolchain

      - name: Create artifact (Linux)
        if: matrix.os == 'linux'
        working-directory: ${{ matrix.toolchain }}
        run: sudo -u nerves -E HOME=/home/nerves mix nerves.artifact ${{ matrix.toolchain }} --path /home/nerves/deploy/toolchain

      - name: Create artifact (macOS)
        if: matrix.os == 'darwin'
        working-directory: ${{ matrix.toolchain }}
        run: mix nerves.artifact ${{ matrix.toolchain }} --path $HOME/deploy/toolchain

      - name: Upload artifact (Linux)
        if: matrix.os == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.toolchain }}-${{ matrix.os }}-${{ matrix.arch }}
          path: /home/nerves/deploy/toolchain/*.tar.xz
          retention-days: 7

      - name: Upload artifact (macOS)
        if: matrix.os == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.toolchain }}-${{ matrix.os }}-${{ matrix.arch }}
          path: ~/deploy/toolchain/*.tar.xz
          retention-days: 7

  test:
    name: Test ${{ matrix.toolchain }} (linux-${{ matrix.build_arch }}) on Ubuntu ${{ matrix.ubuntu_version }}
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ubuntu:${{ matrix.ubuntu_version }}
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - nerves_toolchain_aarch64_nerves_linux_gnu
          - nerves_toolchain_aarch64_nerves_linux_musl
          - nerves_toolchain_armv7_nerves_linux_gnueabihf
          - nerves_toolchain_armv7_nerves_linux_musleabihf
          - nerves_toolchain_armv5_nerves_linux_musleabi
          - nerves_toolchain_armv6_nerves_linux_gnueabihf
          - nerves_toolchain_i586_nerves_linux_gnu
          - nerves_toolchain_mipsel_nerves_linux_musl
          - nerves_toolchain_x86_64_nerves_linux_gnu
          - nerves_toolchain_x86_64_nerves_linux_musl
          - nerves_toolchain_riscv64_nerves_linux_musl
          - nerves_toolchain_riscv64_nerves_linux_gnu
        build_arch: [x86_64, aarch64]
        ubuntu_version: [focal, jammy]
        # Test aarch64_gnu on noble as well
        include:
          - toolchain: nerves_toolchain_aarch64_nerves_linux_gnu
            build_arch: x86_64
            ubuntu_version: noble
          - toolchain: nerves_toolchain_aarch64_nerves_linux_gnu
            build_arch: aarch64
            ubuntu_version: noble

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install xz-utils
        run: |
          apt-get update
          apt-get -y install xz-utils

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.toolchain }}-linux-${{ matrix.build_arch }}
          path: /tmp/toolchain

      - name: Decompress toolchain archive
        run: |
          mkdir -p /root/toolchain
          tar xvf /tmp/toolchain/*.tar.xz --strip-components=1 -C /root/toolchain

      - name: Compile hello world app
        run: /root/toolchain/bin/*-g++ $GITHUB_WORKSPACE/support/smoketest/main.cpp

  test_macos:
    name: Test ${{ matrix.toolchain }} (darwin-aarch64) on macOS
    needs: build
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - nerves_toolchain_aarch64_nerves_linux_gnu
          - nerves_toolchain_aarch64_nerves_linux_musl
          - nerves_toolchain_armv7_nerves_linux_gnueabihf
          - nerves_toolchain_armv7_nerves_linux_musleabihf
          - nerves_toolchain_armv5_nerves_linux_musleabi
          - nerves_toolchain_armv6_nerves_linux_gnueabihf
          - nerves_toolchain_i586_nerves_linux_gnu
          - nerves_toolchain_mipsel_nerves_linux_musl
          - nerves_toolchain_x86_64_nerves_linux_gnu
          - nerves_toolchain_x86_64_nerves_linux_musl
          - nerves_toolchain_riscv64_nerves_linux_musl
          - nerves_toolchain_riscv64_nerves_linux_gnu

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.toolchain }}-darwin-aarch64
          path: /tmp/toolchain

      - name: Decompress toolchain archive
        run: |
          mkdir -p $HOME/toolchain
          tar xvf /tmp/toolchain/*.tar.xz --strip-components=1 -C $HOME/toolchain

      - name: Compile hello world app
        run: $HOME/toolchain/bin/*-g++ $GITHUB_WORKSPACE/support/smoketest/main.cpp

  deploy:
    name: Deploy to GitHub Release
    needs: [test, test_macos]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare artifacts for upload
        run: |
          mkdir -p release-artifacts
          find artifacts -name "*.tar.xz" -exec cp {} release-artifacts/ \;
          ls -lh release-artifacts/

      - name: Extract release notes
        run: |
          grep -Pazo "(?s)(?<=## ${GITHUB_REF_NAME})[^#]+" ./CHANGELOG.md > RELEASE_NOTES.md || echo "No release notes found for ${GITHUB_REF_NAME}" > RELEASE_NOTES.md

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} release-artifacts/*.tar.xz
